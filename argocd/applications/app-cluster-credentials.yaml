# Wave 2 - Cluster credentials (ExternalSecret objects) must be synced before
# CAPI Cluster resources are created so credential secrets exist at cluster bootstrap time.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nkp-cluster-credentials
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: nkp-infra
  source:
    repoURL: https://github.com/rakeshsurapaneni/argocd-nkp
    targetRevision: main
    path: gitops/cluster-credentials
  destination:
    server: https://kubernetes.default.svc
    # ExternalSecret objects deploy to workspace namespaces (engineering/finance/sales/it).
    # Each resource has its namespace set explicitly in the overlay patches.
    namespace: engineering
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
