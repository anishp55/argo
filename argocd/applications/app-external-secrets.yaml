# Wave 1 - External Secrets (SecretStore, ServiceAccount, RoleBinding) must exist
# before cluster-credentials ExternalSecret objects can reference them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nkp-external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: nkp-infra
  source:
    repoURL: https://github.com/rakeshsurapaneni/argocd-nkp
    targetRevision: main
    path: gitops/external-secrets
  destination:
    server: https://kubernetes.default.svc
    # Resources deploy to workspace namespaces (engineering/finance/sales/it)
    # and capx-system. Each resource has its namespace set explicitly.
    namespace: capx-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
